name: Release and Publish

on:
  push:
    branches: [production]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.28.2"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup safe-chain
        run: |
          npm i -g @aikidosec/safe-chain
          safe-chain setup-ci

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --safe-chain-malware-action=block

      - name: Get package version
        id: package-version
        run: echo "version=v$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag-check
        run: |
          if git rev-parse "${{ steps.package-version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests and build
        if: steps.tag-check.outputs.exists == 'false'
        run: |
          pnpm run check-types
          pnpm run check
          pnpm run package
        env:
          DISPLAY: :99

      - name: Create Git tag
        if: steps.tag-check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.package-version.outputs.version }}" -m "Release ${{ steps.package-version.outputs.version }}"
          git push origin "${{ steps.package-version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.tag-check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ steps.package-version.outputs.version }}
          name: ${{ steps.package-version.outputs.version }} - Release
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to VS Code Marketplace
        if: steps.tag-check.outputs.exists == 'false'
        run: pnpm dlx @vscode/vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.AZURE_VSCE_PAT }}

      - name: Publish to Open VSX Registry
        if: steps.tag-check.outputs.exists == 'false'
        run: pnpm run ovsx:publish
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
